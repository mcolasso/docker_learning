services:
  db:
    image: mariadb:10.11
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: aluno123

  phpmyadmin:
    image: phpmyadmin
    restart: always
    ports:
      - "8080:80"
    environment:
      - PMA_ARBITRARY=1

  web:
    build:
      context: ./
      dockerfile: Dockerfile-nginx
    ports:
      - "80:80"
    volumes:
      - ./meufrontend:/usr/share/nginx/html
      - .:/var/www/html

  php-fpm:
    image: php:8.3-fpm
    container_name: fzl-php8.3-fpm
    volumes:
      - ./meufrontend:/var/www/html